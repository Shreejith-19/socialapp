# Spring Profiles for Different Environments

spring:
  profiles:
    active: dev
  
  # Datasource Configuration for Development
  datasource:
    url: jdbc:h2:mem:socialappdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

# Logging for Development
logging:
  level:
    root: INFO
    com.example.socialapp: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# Server Configuration
server:
  port: 8080

# JWT Configuration
jwt:
  secret: dev-secret-key-not-for-production-must-be-at-least-256-bits-long
  expiration: 86400000
